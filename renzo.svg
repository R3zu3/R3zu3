<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 220" width="640" height="220" role="img" aria-label="RENZO">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7AA2F7"/>
      <stop offset="50%" stop-color="#BB9AF7">
        <animate attributeName="offset" values="0.2;0.8;0.2" dur="5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#7DCFFF"/>
    </linearGradient>
    <style>
      .row {
        fill: url(#grad);
        font-family: 'Fira Code', 'Cascadia Code', 'Courier New', monospace;
        font-size: 22px;
        font-weight: 700;
        white-space: pre;
        opacity: 0;
        animation: rise .5s ease forwards;
      }
      .r1{animation-delay:.05s} .r2{animation-delay:.20s} .r3{animation-delay:.35s}
      .r4{animation-delay:.50s} .r5{animation-delay:.65s} .r6{animation-delay:.80s}
      @keyframes rise { from { opacity:0; transform: translateY(10px) } to { opacity:1; transform: translateY(0) } }
      .tag {
        fill:#565f89; font-family:'Fira Code', monospace; font-size:13px; letter-spacing:3px;
        opacity:0; animation: fade 1s ease forwards; animation-delay:1s;
      }
      @keyframes fade { to { opacity:1 } }
    </style>
  </defs>
  <text class="row r1" x="18" y="42" xml:space="preserve">██████╗ ███████╗███╗   ██╗███████╗ ██████╗</text>
  <text class="row r2" x="18" y="72" xml:space="preserve">██╔══██╗██╔════╝████╗  ██║╚══███╔╝██╔═══██╗</text>
  <text class="row r3" x="18" y="102" xml:space="preserve">██████╔╝█████╗  ██╔██╗ ██║  ███╔╝ ██║   ██║</text>
  <text class="row r4" x="18" y="132" xml:space="preserve">██╔══██╗██╔══╝  ██║╚██╗██║ ███╔╝  ██║   ██║</text>
  <text class="row r5" x="18" y="162" xml:space="preserve">██║  ██║███████╗██║ ╚████║███████╗╚██████╔╝</text>
  <text class="row r6" x="18" y="192" xml:space="preserve">╚═╝  ╚═╝╚══════╝╚═╝  ╚═══╝╚══════╝ ╚═════╝</text>
  <text class="tag" x="20" y="214">CTO · CO-FOUNDER · UISR</text>
